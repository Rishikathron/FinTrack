<!-- Side Menu Overlay -->
@if (sideMenuOpen()) {
  <div class="overlay" (click)="closeMenu()"></div>
}

<!-- Side Menu Drawer -->
<aside class="side-menu" [class.open]="sideMenuOpen()">
  <div class="side-menu-header">
    <span class="side-menu-title">Menu</span>
    <button class="side-menu-close" (click)="closeMenu()" aria-label="Close menu">✕</button>
  </div>
  <nav class="side-menu-nav">
    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">
      <span class="menu-icon" aria-hidden="true">📊</span> Dashboard
    </a>
    <a routerLink="/assets" routerLinkActive="active" (click)="closeMenu()">
      <span class="menu-icon" aria-hidden="true">💼</span> My Assets
    </a>
  </nav>
</aside>

<!-- Top Navbar -->
<nav class="navbar">
  <button class="hamburger" (click)="toggleMenu()" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
  <a class="nav-brand" routerLink="/dashboard">💰 FinTrack</a>
</nav>

<main class="container">
  <router-outlet />
</main>

<!-- Global chat widget — persists across all pages -->
<app-chat-widget />

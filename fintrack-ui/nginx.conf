server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular routes -- fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the .NET backend
    # API_URL is resolved at container startup via envsubst
    location /api/ {
        # Resolve upstream at request time (not startup) to avoid crash if DNS is slow
        resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;
        set $backend ${API_URL};
        proxy_pass $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
